<html lang="ko">

  <style>
    :root{--bg:#07111f;--panel:rgba(7,16,31,.88);--panel2:rgba(255,255,255,.07);--line:rgba(255,255,255,.16);--text:#f6fbff;--muted:#b7c4d7;--accent:#55d6ff;--good:#72f28f;--warn:#ffd36b;--bad:#ff6b8a}
    *{box-sizing:border-box}body{margin:0;overflow:hidden;background:radial-gradient(circle at 30% 20%,#183b7a 0,#07111f 38%,#030712 100%);font-family:ui-rounded,"Apple SD Gothic Neo",system-ui,sans-serif;color:var(--text)}button{font:inherit}canvas#game{position:fixed;inset:0;width:100vw;height:100vh;display:block}
    video{position:fixed;right:18px;bottom:18px;width:260px;max-width:36vw;aspect-ratio:4/3;object-fit:cover;border-radius:18px;border:2px solid rgba(85,214,255,.72);transform:scaleX(-1);opacity:1;box-shadow:0 18px 55px rgba(0,0,0,.4);z-index:5}.hud{position:fixed;left:18px;top:18px;display:flex;gap:10px;z-index:3}.card{background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;padding:11px 14px;box-shadow:0 14px 40px rgba(0,0,0,.28)}.score{font-size:36px;font-weight:950;letter-spacing:-1px}.label{font-size:12px;color:var(--muted);font-weight:800}.metric{min-width:88px}.metric b{display:block;font-size:24px;margin-top:2px}.time.low b{color:var(--bad)}
    .status{position:fixed;right:18px;top:18px;z-index:4;text-align:right;color:var(--muted);font-weight:750;font-size:13px;line-height:1.55}.pose{color:var(--accent)}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.center{position:fixed;inset:0;display:grid;place-items:center;z-index:8;background:rgba(2,7,16,.12)}.modal{max-width:760px;width:min(760px,calc(100vw - 32px));max-height:calc(100vh - 32px);overflow:auto;background:linear-gradient(145deg,rgba(10,25,48,.88),rgba(5,12,25,.90));border:1px solid rgba(120,220,255,.26);border-radius:30px;padding:32px;box-shadow:0 35px 100px rgba(0,0,0,.58),inset 0 1px rgba(255,255,255,.08);text-align:center}.eyebrow{color:var(--accent);font-size:13px;font-weight:950;letter-spacing:.13em}.modal h1{font-size:clamp(42px,7vw,64px);line-height:.92;margin:8px 0 16px;letter-spacing:-.07em}.center.calibrating{background:rgba(2,7,16,.04);place-items:start center;padding-top:18px}.center.calibrating .modal{max-width:560px;padding:22px;background:rgba(5,12,25,.72);backdrop-filter:none}.center.calibrating .modal h1{font-size:clamp(30px,5vw,44px)}.modal p{color:var(--muted);font-size:18px;line-height:1.55;margin:10px auto;max-width:620px}.rules{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:22px 0;text-align:left}.rule{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.4}.rule b{display:block;color:var(--accent);margin-bottom:4px}.step{display:inline-grid;place-items:center;width:24px;height:24px;margin-right:7px;border-radius:50%;background:rgba(85,214,255,.16);color:var(--accent);font-size:13px}.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{min-width:170px;border:0;border-radius:999px;padding:14px 22px;font-size:17px;font-weight:950;color:#04101d;background:linear-gradient(135deg,#6ee7ff,#88ffb0);cursor:pointer;box-shadow:0 8px 30px rgba(85,214,255,.22)}.btn:hover{filter:brightness(1.08)}.btn:focus-visible{outline:3px solid white;outline-offset:3px}.btn.secondary{background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--line);box-shadow:none}.btn:disabled{opacity:.5;cursor:wait}.help{font-size:13px!important}.calibration{margin:22px 0}.cal-icon{font-size:64px;font-weight:950;color:var(--accent);line-height:1}.progress{height:12px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;margin:18px auto 8px;max-width:420px}.progress>i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--accent),var(--good));border-radius:inherit;transition:width .12s}.countdown{position:fixed;inset:0;display:grid;place-items:center;z-index:7;pointer-events:none;background:rgba(2,8,18,.38)}.countdown b{font-size:min(34vw,240px);line-height:1;color:white;text-shadow:0 10px 50px rgba(85,214,255,.65);animation:pop .72s ease both}.armMeter{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:4;width:min(420px,calc(100vw - 36px));background:rgba(3,10,22,.72);border:1px solid var(--line);border-radius:18px;padding:11px 13px;box-shadow:0 14px 40px rgba(0,0,0,.32);backdrop-filter:blur(12px)}.armMeter .top{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:850;color:var(--muted);margin-bottom:7px}.armTrack{height:14px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;position:relative}.armTrack::after{content:'팔 올림 기준';position:absolute;left:56%;top:0;bottom:0;border-left:2px dashed rgba(255,255,255,.75);font-size:10px;color:white;padding-left:5px;line-height:14px;white-space:nowrap}.armTrack i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--warn),var(--accent),var(--good));border-radius:inherit;transition:width .12s}.toast{position:fixed;left:50%;top:88px;transform:translateX(-50%);z-index:6;background:rgba(0,0,0,.72);border:1px solid var(--line);border-radius:999px;padding:10px 17px;font-weight:950;opacity:0;transition:opacity .2s,transform .2s}.toast.show{opacity:1;transform:translate(-50%,-10px)}.result{font-size:48px;font-weight:950;color:var(--good);margin:12px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}.result-grid div{padding:14px;background:var(--panel2);border-radius:15px}.result-grid b{display:block;font-size:25px}.result-grid span{color:var(--muted);font-size:12px}.landscape-tip{position:fixed;left:50%;top:128px;transform:translateX(-50%);z-index:4;background:rgba(255,211,107,.94);color:#241600;border-radius:999px;padding:9px 14px;font-weight:950;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:none}@media (orientation:portrait){.landscape-tip{display:block}video{width:180px;right:10px;bottom:10px}.hud{transform:scale(.86);transform-origin:left top}.status{left:12px;right:12px;bottom:12px;top:auto;text-align:left}.armMeter{bottom:74px}}.play-toggle{position:fixed;right:10px;bottom:10px;z-index:9;border:1px solid rgba(255,255,255,.25);background:rgba(3,10,22,.55);color:white;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;opacity:.55}body.playing video{width:1px!important;height:1px!important;opacity:0!important;border:0!important;box-shadow:none!important;right:auto!important;left:0!important;top:0!important;bottom:auto!important}body.playing .hud{left:50%;top:8px;transform:translateX(-50%);gap:6px;opacity:.78;z-index:6}body.playing .hud .card{padding:6px 10px;border-radius:999px;background:rgba(3,10,22,.45);box-shadow:none;backdrop-filter:blur(8px)}body.playing .hud .card:nth-child(2){display:none}body.playing .label{display:none}body.playing .score{font-size:22px;line-height:1}body.playing .metric{min-width:auto}body.playing .metric b{font-size:18px;margin:0}body.playing .status{display:none}body.playing .armMeter{left:auto;right:8px;top:8px;bottom:auto;transform:none;width:auto;min-width:116px;padding:6px 9px;border-radius:999px;background:rgba(3,10,22,.42);box-shadow:none;opacity:.72}body.playing .armMeter .top{margin:0;font-size:11px;display:block;text-align:center}body.playing .armMeter .top span{display:none}body.playing .armTrack{display:none}body.playing .toast{top:46px;padding:6px 11px;font-size:12px;opacity:0}body.playing .toast.show{opacity:.75}body.playing .landscape-tip{display:none!important}body.playing .play-toggle{opacity:.38}body.playing .play-toggle:hover{opacity:.9}body.playing.debug-ui video{width:170px!important;height:auto!important;opacity:.78!important;right:10px!important;bottom:10px!important;left:auto!important;top:auto!important;border:1px solid rgba(85,214,255,.5)!important}body.playing.debug-ui .status{display:block;right:10px;top:50px;font-size:11px;background:rgba(3,10,22,.42);padding:7px 9px;border-radius:12px}body.playing.debug-ui .armMeter{opacity:.95}.center.calibrating .modal{position:fixed;left:50%;top:14px;transform:translateX(-50%);width:min(520px,calc(100vw - 24px));max-height:42vh;overflow:auto;padding:16px 18px;border-radius:22px}.center.calibrating .modal p{font-size:14px;line-height:1.35}.center.calibrating .progress{margin:10px auto 6px}.center.calibrating .cal-icon{font-size:38px}.center.calibrating .btn{padding:9px 14px;min-width:120px;font-size:14px}.shieldHud{position:fixed;left:50%;top:44px;transform:translateX(-50%);z-index:6;background:rgba(114,242,143,.18);border:1px solid rgba(114,242,143,.42);color:#baffc8;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:950;display:none}body.has-shield .shieldHud{display:block}body.playing .shieldHud{display:block}.hidden{display:none!important}@keyframes pop{0%{opacity:0;transform:scale(.55)}35%{opacity:1;transform:scale(1.08)}100%{opacity:0;transform:scale(.9)}}
    @media(max-width:720px){.modal{padding:22px;margin-top:70px}.center{place-items:start center;padding-top:14px}.modal p{font-size:16px}.rules{grid-template-columns:1fr}.rule{padding:10px 12px}video{width:170px;max-width:44vw}.hud{max-width:70vw;flex-wrap:wrap}.score{font-size:28px}.status{font-size:11px}.result-grid{grid-template-columns:1fr}.result-grid div{padding:8px}.result-grid b{display:inline;margin-right:8px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <canvas id="game"></canvas><video id="webcam" autoplay muted playsinline></video>
  <div class="hud"><div class="card"><div class="label">현재 점수</div><div id="score" class="score">0</div></div><div class="card metric"><div class="label">최고 기록</div><b id="best">0</b></div><div id="timeCard" class="card metric time"><div class="label">남은 시간</div><b id="time">60초</b></div></div>
  <div class="status">카메라 <span id="camState" class="warn">준비 전</span><br>동작 <span id="poseState" class="pose">대기</span><br><span>Space / ↑ = 날개짓 · H = 도움말 · 폰은 가로모드 추천</span></div>
  <div id="armMeter" class="armMeter"><div class="top"><span>팔 높이</span><b id="armText">상반신을 보여주세요</b></div><div class="armTrack"><i id="armBar"></i></div></div><div id="toast" class="toast" role="status">좋아요!</div><div class="landscape-tip">📱 가로모드로 돌리면 장애물이 더 멀리 보여요</div><div id="countdown" class="countdown hidden"><b>3</b></div>
  <div id="shieldHud" class="shieldHud">🛡️ 방패 1회</div><button id="uiToggle" class="play-toggle" type="button">UI</button><div id="overlay" class="center"><div id="modal" class="modal"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script>
    'use strict';
    const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),video=$('webcam'),overlay=$('overlay'),modal=$('modal'),scoreEl=$('score'),bestEl=$('best'),timeEl=$('time'),timeCard=$('timeCard'),camState=$('camState'),poseState=$('poseState'),toast=$('toast'),countdown=$('countdown'),armBar=$('armBar'),armText=$('armText'),uiToggle=$('uiToggle');
    let W=innerWidth,H=innerHeight,DPR=devicePixelRatio||1;function resize(){W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
    const state={running:false,demo:false,counting:false,last:performance.now(),score:0,best:+localStorage.wingBest||0,time:60,level:1,combo:0,shield:0,itemSpawn:0,bird:{x:W*.18,y:H*.46,vy:0,r:21,wing:0},pipes:[],coins:[],items:[],particles:[],floats:[],speed:165,spawn:0,coinSpawn:0,flap:0,hits:0,coinsGot:0};bestEl.textContent=state.best;
    const detector={samples:[],baseline:.16,smoothed:.16,phase:'down',lastFlap:0,lastSeen:0,calibrated:false,calibrating:false,pose:null,raisePct:0,armsUp:false};let poseController=null,toastTimer=0,countdownToken=0;
    function home(){document.body.classList.remove('playing','debug-ui');overlay.classList.remove('calibrating');modal.innerHTML='<div class="eyebrow">YOUTH CENTER BOOTH MISSION</div><h1>날개짓<br>대작전</h1><p>양팔을 <b>어깨 위로 들고 있으면</b> 새가 계속 떠요. 60초 동안 장애물을 통과하고 코인을 모으면 됩니다. <b>폰은 가로모드 권장!</b></p><div class="rules"><div class="rule"><b><span class="step">1</span>화면에 서기</b>상반신과 양손이 보이도록 1.5~2m 떨어져요.</div><div class="rule"><b><span class="step">2</span>3초 맞춤 설정</b>팔을 편하게 내리고 잠깐 기다려요.</div><div class="rule"><b><span class="step">3</span>크게 퍼덕이기</b>양손을 어깨 위로 올리고 유지해요.</div></div><div class="btns"><button id="startBtn" class="btn">카메라로 시작</button><button id="demoBtn" class="btn secondary">키보드 데모</button></div><p class="help">팔을 들고 있으면 자동으로 연속 상승합니다. 카메라가 어려우면 Space 또는 ↑ 키로 플레이할 수 있어요.</p>';bindHome()}
    function bindHome(){$('startBtn').onclick=startCamera;$('demoBtn').onclick=()=>{state.demo=true;camState.textContent='키보드 데모';camState.className='good';beginCountdown()}}
    function showHelp(){state.running=false;state.counting=false;countdownToken++;countdown.classList.add('hidden');overlay.classList.remove('hidden');home()}
    function showCalibration(){document.body.classList.remove('playing','debug-ui');overlay.classList.add('calibrating');modal.innerHTML='<div class="eyebrow">카메라 맞춤 설정</div><h1>팔을 편하게<br>내려주세요</h1><div class="calibration"><div class="cal-icon">\u2193</div><p id="calText">화면에 상반신과 양손이 모두 보이면 자동으로 시작해요.</p><div class="progress"><i id="calBar"></i></div><p class="help">밝은 곳에서 카메라를 정면으로 바라봐 주세요.</p></div><div class="btns"><button id="cancelBtn" class="btn secondary">돌아가기</button></div>';$('cancelBtn').onclick=()=>{detector.calibrating=false;home()}}
    async function startCamera(){const btn=$('startBtn');btn.disabled=true;btn.textContent='카메라 연결 중';state.demo=false;showCalibration();try{if(!navigator.mediaDevices?.getUserMedia)throw new Error('카메라 API를 지원하지 않는 브라우저입니다.');if(!poseController){camState.textContent='권한 요청 중';const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});video.srcObject=stream;await video.play();const pose=new Pose({locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});pose.setOptions({modelComplexity:0,smoothLandmarks:true,minDetectionConfidence:.58,minTrackingConfidence:.58});pose.onResults(onPose);poseController=new Camera(video,{onFrame:async()=>pose.send({image:video}),width:640,height:480});await poseController.start()}camState.textContent='연결됨';camState.className='good';startCalibration()}catch(err){console.error(err);camState.textContent='연결 실패';camState.className='bad';modal.innerHTML='<div class="eyebrow bad">카메라를 연결하지 못했어요</div><h1>키보드로<br>플레이할까요?</h1><p>브라우저의 카메라 권한과 HTTPS 또는 localhost 접속을 확인해 주세요.</p><div class="btns"><button id="retryBtn" class="btn">다시 시도</button><button id="fallbackBtn" class="btn secondary">키보드로 시작</button></div>';$('retryBtn').onclick=()=>{poseController=null;startCamera()};$('fallbackBtn').onclick=()=>{state.demo=true;beginCountdown()}}}
    function startCalibration(){detector.samples=[];detector.calibrated=false;detector.calibrating=true;detector.phase='down';const bar=$('calBar');if(bar)bar.style.width='0%'}
    function finishCalibration(){detector.calibrating=false;detector.calibrated=true;detector.baseline=detector.samples.reduce((a,b)=>a+b,0)/detector.samples.length;detector.smoothed=detector.baseline;poseState.textContent='맞춤 완료';poseState.className='good';showToast('맞춤 설정 완료!');beginCountdown()}
    function beginCountdown(){if(state.counting)return;document.body.classList.add('playing');const token=++countdownToken;overlay.classList.add('hidden');state.counting=true;resetRound();let n=3;countdown.classList.remove('hidden');const tick=()=>{if(token!==countdownToken)return;countdown.innerHTML=`<b>${n||'출발!'}</b>`;if(n-- >0)setTimeout(tick,760);else setTimeout(()=>{if(token!==countdownToken)return;countdown.classList.add('hidden');state.counting=false;state.running=true;state.last=performance.now()},620)};tick()}
    function resetRound(){document.body.classList.remove('has-shield');state.running=false;state.score=0;state.time=60;state.level=1;state.combo=0;state.shield=0;state.speed=165;state.pipes=[];state.coins=[];state.items=[];state.particles=[];state.floats=[];state.bird={x:W*.18,y:H*.46,vy:0,r:21,wing:0};state.spawn=1.15;state.coinSpawn=.7;state.itemSpawn=6;state.hits=0;state.coinsGot=0;state.last=performance.now();timeCard.classList.remove('low')}
    function showToast(text){clearTimeout(toastTimer);toast.textContent=text;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),700)}function floatText(text,x,y,color='#fff'){state.floats.push({text,x,y,vy:-42,a:1,color,life:.9})}function addScore(n,label,x=state.bird.x+24,y=state.bird.y-24,color=n>=0?'#72f28f':'#ff6b8a'){state.score=Math.max(0,state.score+n);floatText(`${label} ${n>0?'+':''}${n}`,x,y,color)}function setShield(n){state.shield=n;document.body.classList.toggle('has-shield',state.shield>0)}
    function flap(power=1){if(!state.running)return;state.bird.vy=-330*power;state.bird.wing=1;state.flap=.18;for(let i=0;i<8;i++)state.particles.push({x:state.bird.x-22,y:state.bird.y+8,vx:-70-Math.random()*80,vy:(Math.random()-.5)*100,a:1,c:'#7ee7ff'})}
    function endGame(){if(!state.running)return;document.body.classList.remove('playing','debug-ui','has-shield');overlay.classList.remove('calibrating');state.running=false;const isBest=state.score>state.best;if(isBest){state.best=state.score;localStorage.wingBest=state.best;bestEl.textContent=state.best}overlay.classList.remove('hidden');modal.innerHTML=`<div class="eyebrow ${isBest?'good':''}">${isBest?'새 최고 기록':'60초 미션 완료'}</div><h1>미션 종료!</h1><div class="result">${state.score}점</div><div class="result-grid"><div><b>${state.score}</b><span>최종 점수</span></div><div><b>${state.coinsGot}</b><span>획득 코인</span></div><div><b>${state.hits}</b><span>충돌 횟수</span></div></div><p>${isBest?'대단해요! 오늘의 최고 기록을 새로 썼어요.':'한 번 더 도전하면 최고 기록에 가까워질 거예요.'}</p><div class="btns"><button id="againBtn" class="btn">다시 도전</button><button id="homeBtn" class="btn secondary">도움말 보기</button></div>`;$('againBtn').onclick=beginCountdown;$('homeBtn').onclick=home}
    function spawnPipe(){const gap=Math.max(205,H*.38-Math.min(52,state.score*.35+state.level*7)),margin=Math.min(130,H*.18),cy=margin+gap*.12+Math.random()*Math.max(40,H-margin*2-gap*.24);state.pipes.push({x:W+150,w:68,gapY:cy,gap,scored:false,near:false})}function spawnCoin(){state.coins.push({x:W+120,y:90+Math.random()*Math.max(20,H-180),r:12,t:0,got:false})}function spawnItem(){const types=['star','shield'];state.items.push({type:types[Math.random()<.58?0:1],x:W+150,y:100+Math.random()*Math.max(20,H-200),r:16,t:0,got:false})}function hitCircleRect(cx,cy,cr,rx,ry,rw,rh){const x=Math.max(rx,Math.min(cx,rx+rw)),y=Math.max(ry,Math.min(cy,ry+rh));return(cx-x)**2+(cy-y)**2<cr**2}
    function drawBg(t){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0b2a55');g.addColorStop(1,'#06101e');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.9)';for(let i=0;i<38;i++){const x=(i*173+t*.018*(20+i%7))%W,y=(i*89)%Math.max(H,1),r=1+i%3;ctx.globalAlpha=.18+i%5*.04;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill()}ctx.globalAlpha=1;ctx.fillStyle='rgba(85,214,255,.08)';ctx.beginPath();ctx.arc(W*.1,H*.22,180,0,7);ctx.fill()}
    function drawBird(){const b=state.bird;ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.max(-.55,Math.min(.55,b.vy/520)));ctx.fillStyle='#ffd65c';ctx.beginPath();ctx.ellipse(0,0,b.r*1.18,b.r*.9,0,0,7);ctx.fill();ctx.fillStyle='#ff9f45';ctx.beginPath();ctx.moveTo(b.r*.9,-2);ctx.lineTo(b.r*1.55,6);ctx.lineTo(b.r*.9,14);ctx.fill();ctx.fillStyle='#101827';ctx.beginPath();ctx.arc(9,-8,4,0,7);ctx.fill();ctx.fillStyle='#79e7ff';ctx.globalAlpha=.85;ctx.beginPath();ctx.ellipse(-16,8+Math.sin(performance.now()/60)*8*b.wing,24,10+18*b.wing,-.5,0,7);ctx.fill();ctx.restore();b.wing*=.9}function roundRect(x,y,w,h,r){if(h<=0)return;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();ctx.stroke()}function drawPipe(p){ctx.fillStyle='#57e389';ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=2;const topH=p.gapY-p.gap/2,bottomY=p.gapY+p.gap/2;roundRect(p.x,0,p.w,topH,18);roundRect(p.x,bottomY,p.w,H-bottomY,18);ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(p.x+12,0,8,Math.max(0,topH));ctx.fillRect(p.x+12,bottomY,8,Math.max(0,H-bottomY))}function drawCoin(c){c.t+=.1;ctx.save();ctx.translate(c.x,c.y);ctx.scale(Math.abs(Math.cos(c.t))*.55+.45,1);ctx.fillStyle='#ffd84d';ctx.strokeStyle='#fff4aa';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,c.r,0,7);ctx.fill();ctx.stroke();ctx.restore()}function drawItem(it){it.t+=.08;ctx.save();ctx.translate(it.x,it.y);ctx.rotate(Math.sin(it.t)*.12);ctx.font=`${it.r*1.8}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=18;ctx.shadowColor=it.type==='shield'?'#72f28f':'#ffd84d';ctx.fillText(it.type==='shield'?'🛡️':'⭐',0,0);ctx.restore()}
    
    function drawPoseRig(now){if((state.running||state.counting||detector.calibrating)&&!document.body.classList.contains('debug-ui'))return;const lm=detector.pose;if(!lm||now-detector.lastSeen>900)return;const map=p=>({x:(1-p.x)*W,y:p.y*H,v:p.visibility??1});const P=i=>map(lm[i]);const pts={ls:P(11),rs:P(12),le:P(13),re:P(14),lw:P(15),rw:P(16),lh:P(23),rh:P(24)};const ok=p=>p&&p.v>.45,armsUp=detector.armsUp,alpha=Math.min(1,Math.max(.25,1-(now-detector.lastSeen)/900));ctx.save();ctx.globalAlpha=alpha;ctx.lineCap='round';ctx.lineJoin='round';function line(a,b,color,width=9){if(!ok(a)||!ok(b))return;ctx.strokeStyle=color;ctx.lineWidth=width;ctx.shadowBlur=armsUp?22:12;ctx.shadowColor=color;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}function dot(a,r,color){if(!ok(a))return;ctx.fillStyle=color;ctx.shadowBlur=armsUp?24:14;ctx.shadowColor=color;ctx.beginPath();ctx.arc(a.x,a.y,r,0,7);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=2;ctx.stroke()}const body='rgba(255,255,255,.42)',arm=armsUp?'#72f28f':'#55d6ff',hand=armsUp?'#9cffb0':'#ffd36b';line(pts.ls,pts.rs,body,7);line(pts.ls,pts.lh,body,5);line(pts.rs,pts.rh,body,5);line(pts.lh,pts.rh,'rgba(255,255,255,.2)',4);line(pts.ls,pts.le,arm);line(pts.le,pts.lw,arm);line(pts.rs,pts.re,arm);line(pts.re,pts.rw,arm);[pts.ls,pts.rs,pts.le,pts.re].forEach(a=>dot(a,8,arm));dot(pts.lw,13,hand);dot(pts.rw,13,hand);const shoulderY=(pts.ls.y+pts.rs.y)/2;ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.35)';ctx.setLineDash([9,9]);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(Math.min(pts.ls.x,pts.rs.x)-120,shoulderY);ctx.lineTo(Math.max(pts.ls.x,pts.rs.x)+120,shoulderY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=armsUp?'rgba(114,242,143,.95)':'rgba(255,255,255,.82)';ctx.font='900 18px ui-rounded, system-ui, sans-serif';ctx.textAlign='center';ctx.fillText(armsUp?'팔 올림 인식 중':'어깨선 위로 양손 올리기',W/2,Math.max(38,shoulderY-18));ctx.fillStyle='rgba(3,10,22,.72)';ctx.beginPath();ctx.roundRect(W/2-92,shoulderY+12,184,28,14);ctx.fill();ctx.fillStyle=armsUp?'#72f28f':'#55d6ff';ctx.fillRect(W/2-84,shoulderY+20,168*(detector.raisePct/100),12);ctx.strokeStyle='rgba(255,255,255,.35)';ctx.strokeRect(W/2-84,shoulderY+20,168,12);ctx.restore()}
function loop(now){const dt=Math.min(.033,(now-state.last)/1000);state.last=now;drawBg(now);drawPoseRig(now);if(state.running){state.time-=dt;if(state.time<=0)endGame();const elapsed=60-state.time,nextLevel=elapsed>=40?3:elapsed>=20?2:1;if(nextLevel!==state.level){state.level=nextLevel;showToast(`LEVEL ${state.level}!`);floatText(`LEVEL ${state.level}`,W*.5,H*.34,'#ffd36b')}state.spawn-=dt;state.coinSpawn-=dt;state.itemSpawn-=dt;if(state.spawn<=0){spawnPipe();state.spawn=Math.max(1.45,2.25-state.level*.18)}if(state.coinSpawn<=0){spawnCoin();state.coinSpawn=Math.max(1.0,1.55-state.level*.08)}if(state.itemSpawn<=0){spawnItem();state.itemSpawn=7.5+Math.random()*3.5}if(state.demo&&Math.random()<.012)flap(.9);state.bird.vy+=760*dt;state.bird.y+=state.bird.vy*dt;state.bird.x=W*.18;if(state.flap>0)state.flap-=dt;state.speed=155+state.level*24+Math.min(80,state.score*1.15);for(const p of state.pipes){p.x-=state.speed*dt;drawPipe(p);const b=state.bird,topH=p.gapY-p.gap/2,bottomY=p.gapY+p.gap/2,hit=hitCircleRect(b.x,b.y,b.r,p.x,0,p.w,topH)||hitCircleRect(b.x,b.y,b.r,p.x,bottomY,p.w,H);if(hit){if(state.shield>0){setShield(state.shield-1);showToast('방패로 막음!');floatText('BLOCK',b.x+22,b.y-24,'#72f28f')}else{addScore(-5,'충돌',b.x+20,b.y-20,'#ff6b8a');state.combo=0;state.hits++}p.x=-999}if(!p.scored&&p.x+p.w<b.x){p.scored=true;state.combo++;const edge=Math.min(Math.abs(b.y-topH),Math.abs(b.y-bottomY)),near=edge<34;let gain=3+Math.min(10,Math.floor(state.combo/3)*2)+(near?5:0);addScore(gain,near?'아슬아슬':'통과',b.x+28,b.y-28,near?'#ffd36b':'#72f28f');showToast(near?`위험 회피! COMBO x${state.combo}`:`COMBO x${state.combo}`)}}state.pipes=state.pipes.filter(p=>p.x>-120);for(const c of state.coins){c.x-=state.speed*dt;drawCoin(c);const b=state.bird;if(!c.got&&(b.x-c.x)**2+(b.y-c.y)**2<(b.r+c.r)**2){c.got=true;state.combo++;addScore(10+Math.min(10,state.combo),'코인',c.x,c.y,'#ffd84d');state.coinsGot++;showToast(`코인! COMBO x${state.combo}`);for(let i=0;i<12;i++)state.particles.push({x:c.x,y:c.y,vx:(Math.random()-.5)*180,vy:(Math.random()-.5)*180,a:1,c:'#ffd84d'})}}state.coins=state.coins.filter(c=>c.x>-50&&!c.got);for(const it of state.items){it.x-=state.speed*dt;drawItem(it);const b=state.bird;if(!it.got&&(b.x-it.x)**2+(b.y-it.y)**2<(b.r+it.r)**2){it.got=true;if(it.type==='shield'){setShield(1);showToast('방패 획득!');floatText('방패 1회',it.x,it.y,'#72f28f')}else{addScore(25,'별',it.x,it.y,'#ffd36b');showToast('별 보너스!')}}}state.items=state.items.filter(it=>it.x>-60&&!it.got);if(state.bird.y<20){state.bird.y=20;state.bird.vy=80}if(state.bird.y>H-35){if(state.shield>0){setShield(state.shield-1);showToast('방패로 바닥 방어');floatText('BLOCK',state.bird.x,state.bird.y-40,'#72f28f')}else{addScore(-8,'바닥',state.bird.x,state.bird.y-30,'#ff6b8a');state.combo=0;state.hits++}state.bird.y=H*.45;state.bird.vy=-260}}drawBird();for(const q of state.particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.a-=dt*1.8;ctx.globalAlpha=Math.max(0,q.a);ctx.fillStyle=q.c;ctx.beginPath();ctx.arc(q.x,q.y,3,0,7);ctx.fill();ctx.globalAlpha=1}state.particles=state.particles.filter(q=>q.a>0);ctx.save();ctx.textAlign='center';ctx.font='900 22px ui-rounded,system-ui';for(const f of state.floats){f.y+=f.vy*dt;f.life-=dt;f.a=Math.max(0,f.life/.9);ctx.globalAlpha=f.a;ctx.fillStyle=f.color;ctx.shadowBlur=14;ctx.shadowColor=f.color;ctx.fillText(f.text,f.x,f.y)}ctx.restore();ctx.globalAlpha=1;state.floats=state.floats.filter(f=>f.life>0);scoreEl.textContent=state.score|0;timeEl.textContent=`${Math.max(0,Math.ceil(state.time))}초`;timeCard.classList.toggle('low',state.running&&state.time<=10);requestAnimationFrame(loop)}requestAnimationFrame(loop);
    function onPose(res){const lm=res.poseLandmarks,now=performance.now();if(!lm){detector.pose=null;detector.armsUp=false;detector.raisePct=0;poseState.textContent='사람을 찾는 중';poseState.className='warn';armText.textContent='사람 인식 대기';armBar.style.width='0%';return}const points=[lm[11],lm[12],lm[15],lm[16]],visible=points.every(p=>p&&p.visibility>.55);if(!visible){detector.pose=lm;detector.armsUp=false;detector.raisePct=0;poseState.textContent='양손과 어깨를 보여주세요';poseState.className='warn';armText.textContent='양손+어깨 필요';armBar.style.width='0%';return}detector.lastSeen=now;detector.pose=lm;const shoulderWidth=Math.max(.08,Math.hypot(lm[11].x-lm[12].x,lm[11].y-lm[12].y)),left=(lm[15].y-lm[11].y)/shoulderWidth,right=(lm[16].y-lm[12].y)/shoulderWidth,level=(left+right)/2;if(detector.calibrating){armText.textContent='팔 내린 기준 측정 중';armBar.style.width='12%';if(level<.2){poseState.textContent='팔을 아래로 내려주세요';poseState.className='warn';return}detector.samples.push(level);const progress=Math.min(100,detector.samples.length/75*100),bar=$('calBar');if(bar)bar.style.width=`${progress}%`;const text=$('calText');if(text)text.textContent=`좋아요, 그대로 있어요… ${Math.round(progress)}%`;if(detector.samples.length>=75)finishCalibration();return}if(!detector.calibrated)return;detector.smoothed=detector.smoothed*.68+level*.32;const upThreshold=Math.min(-.02,detector.baseline-.45),downThreshold=Math.max(.08,detector.baseline-.16),balanced=Math.abs(left-right)<.9,raisePct=Math.max(0,Math.min(100,(detector.baseline-detector.smoothed)/(detector.baseline-upThreshold)*100));detector.raisePct=raisePct;detector.armsUp=raisePct>=56&&balanced;armBar.style.width=`${raisePct}%`;armText.textContent=raisePct>=56?'팔 올림 인정!':raisePct>=35?'조금만 더 위로':'팔을 어깨 위로 올리기';if(!balanced){detector.armsUp=false;poseState.textContent='양팔을 함께 움직여요';poseState.className='warn'}else if(detector.armsUp){detector.phase='up';poseState.textContent='팔 들고 비행 중!';poseState.className='good';if(now-detector.lastFlap>210){detector.lastFlap=no     uiToggle.onclick=()=>document.body.classList.toggle('debug-ui');addEventListener('keydown',e=>{if(e.code==='KeyU'){document.body.classList.toggle('debug-ui');return}if(e.code==='KeyH'){showHelp();return}if(e.code==='Space'||e.code==='ArrowUp'){if(!state.running&&!state.counting)beginCountdown();else flap(1);e.preventDefault()}});home();
